<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonhado Sabor</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white">

<div class="max-w-3xl mx-auto p-4">

<h1 class="text-2xl mb-4">🔥 Sonhado Sabor</h1>

<!-- MENU -->
<div id="menu"></div>

<!-- CARRINHO -->
<div class="mt-6">
<h2 class="text-xl">🛒 Carrinho</h2>
<div id="cart"></div>

<p class="mt-2">Total: <span id="total">R$ 0</span></p>

<input id="name" placeholder="Seu nome" class="w-full p-2 mt-2 text-black">
<input id="phone" placeholder="WhatsApp" class="w-full p-2 mt-2 text-black">

<button onclick="sendOrder()" class="bg-green-500 w-full p-3 mt-3 rounded">
Enviar Pedido
</button>

</div>

<button onclick="adminLogin()" class="mt-6 bg-yellow-500 p-2 rounded">
Admin
</button>

</div>

<script>

// ===== PRODUTOS ORIGINAIS =====
const products = [
{id:'c1',name:'Antartica',price:10},
{id:'c2',name:'Brahma Chopp',price:10},
{id:'c3',name:'Antartica Sub Zero',price:8},
{id:'c4',name:'Conti',price:8},
{id:'c5',name:'Brahma Chopp Buchudinha',price:5},
{id:'c6',name:'Skol',price:5},
{id:'r1',name:'Coca-Cola 1L',price:10},
{id:'r2',name:'Guaraná 1L',price:7},
{id:'r3',name:'Refri Mini Coca-Cola',price:4},
{id:'r4',name:'Refri Mini Sprite',price:4},
{id:'r5',name:'Refri Mini Fanta Laranja',price:4},
{id:'r6',name:'Refri Mini Fanta Uva',price:4},
{id:'a1',name:'Água sem Gás',price:3},
{id:'a2',name:'Água com Gás',price:3},
{id:'e1',name:'Carne Bovina',price:8},
{id:'e2',name:'Frango Tulipa',price:8},
{id:'e3',name:'Coraçãozinho Frango',price:10},
{id:'e4',name:'Kafta',price:10},
{id:'e5',name:'Costela',price:10},
{id:'e6',name:'Pão de Alho Gourmet',price:7},
{id:'cb1',name:'Espetinho Completo',price:25},
{id:'cb2',name:'Espetinho Simples',price:12},
{id:'ad1',name:'Arroz',price:4},
{id:'ad2',name:'Vinagrete',price:4},
{id:'ad3',name:'Maionese',price:4},
{id:'ad4',name:'Mandioca',price:3},
{id:'ad5',name:'Creme de Alho',price:2},
{id:'ad6',name:'Farofa',price:2},
];

// ===== ESTADO =====
let cart = {};
let orders = JSON.parse(localStorage.getItem("orders")) || [];
let isAdmin = false;

// ===== MENU =====
function renderMenu(){
  document.getElementById("menu").innerHTML =
  products.map(p=>`
    <div class="bg-gray-800 p-3 mb-2 rounded flex justify-between">
      <span>${p.name} - R$ ${p.price}</span>
      <button onclick="add('${p.id}')" class="bg-green-500 px-2 rounded">+</button>
    </div>
  `).join('');
}

// ===== CARRINHO =====
function add(id){
  cart[id] = (cart[id] || 0) + 1;
  renderCart();
}

function renderCart(){
  let html = '';
  let total = 0;

  for(let id in cart){
    const p = products.find(x=>x.id===id);
    const qty = cart[id];
    total += p.price * qty;

    html += `
    <div class="flex justify-between">
      ${p.name} x${qty}
    </div>`;
  }

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = "R$ " + total;
}

// ===== PEDIDO =====
function sendOrder(){

  if(Object.keys(cart).length === 0){
    alert("Carrinho vazio");
    return;
  }

  const name = document.getElementById("name").value;

  const order = {
    id: Date.now(),
    name,
    cart,
    total: Object.keys(cart).reduce((t,id)=>{
      const p = products.find(x=>x.id===id);
      return t + p.price * cart[id];
    },0),
    status:'pendente'
  };

  orders.push(order);
  localStorage.setItem("orders", JSON.stringify(orders));

  // WhatsApp
  let msg = "Pedido:\n";
  for(let id in cart){
    const p = products.find(x=>x.id===id);
    msg += `${p.name} x${cart[id]}\n`;
  }
  msg += "Total: R$ " + order.total;

  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);

  cart = {};
  renderCart();

  alert("Pedido enviado!");
}

// ===== ADMIN =====
function adminLogin(){
  const pass = prompt("Senha:");
  if(pass === "1234"){
    isAdmin = true;
    showAdmin();
  }
}

function showAdmin(){

  document.body.innerHTML = `
  <div class="p-4">

  <h1 class="text-xl mb-4">Admin</h1>

  ${orders.map(o=>`
    <div class="bg-gray-800 p-3 mb-2 rounded">
      <strong>${o.name}</strong><br>
      Total: R$ ${o.total}<br>

      <select onchange="updateStatus(${o.id}, this.value)" class="text-black mt-2">
        <option ${o.status==='pendente'?'selected':''}>pendente</option>
        <option ${o.status==='preparando'?'selected':''}>preparando</option>
        <option ${o.status==='pronto'?'selected':''}>pronto</option>
        <option ${o.status==='entregue'?'selected':''}>entregue</option>
      </select>
    </div>
  `).join('')}

  <button onclick="location.reload()" class="mt-4 bg-blue-500 p-2 rounded">
    Voltar
  </button>

  </div>
  `;
}

function updateStatus(id, status){
  const o = orders.find(x=>x.id===id);
  o.status = status;
  localStorage.setItem("orders", JSON.stringify(orders));
  showAdmin();
}

// ===== INIT =====
renderMenu();

</script>

</body>
</html>
